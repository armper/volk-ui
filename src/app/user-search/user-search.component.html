<form>
  <mat-form-field appearance="outline" class="search-field">
    <mat-label>Search users</mat-label>
    <input matInput name="name" [(ngModel)]="name" (keyup)="search(name)" placeholder="Start typing a name..." />
  </mat-form-field>
</form>

<mat-nav-list>
  @for (user of users$ | async; track user.id) {
    <a mat-list-item [routerLink]="['/user-detail', user.id]">
      {{ user.name }} &mdash; {{ user.domainName }}
    </a>
  }
</mat-nav-list>
